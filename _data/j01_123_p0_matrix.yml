                usage:
                  de: "Mail-Service"
                  en: "Mail service"
                technical_sources:
                  - src/Http/Contact/MailService.php
                formal_sources:
                  - README.md
                  - README.en.md
                dependencies:
                  de: "Bleibt fachlich getrennt vom SMTP-Absenderpfad."
