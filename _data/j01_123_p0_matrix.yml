labels:
  de:
    legend: "<code>x</code> markiert aktuell bestätigte Aufnahme in <code>P_0</code>; nichtleere Quellenfelder tragen den technischen oder formalen Beleg."
    parameter: "Parameter"
    short: "Kurzbeschreibung"
    technical_source: "Technische Quelle"
    formal_source: "Formale Quelle"
    dependencies: "Abhängigkeiten"
    p0: "P0"
    none: "-"
  en:
    legend: "<code>x</code> marks confirmed inclusion in <code>P_0</code>; non-empty source fields carry the technical or formal evidence."
    parameter: "Parameter"
    short: "Short description"
    technical_source: "Technical source"
    formal_source: "Formal source"
    dependencies: "Dependencies"
    p0: "P0"
