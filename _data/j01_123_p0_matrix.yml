pipelines:
  - key: common
    summary:
      de: "Gemeinsame technisch belegte Parameter aus dem aktuellen Manifest-Pfad."
      en: "Shared technically evidenced parameters from the current manifest path."
    phases:
      - key: python
        summary:
          de: "Tooling-Pfade für den Python-Runner."
          en: "Tooling paths for the Python runner."
        areas:
          - key: tooling
            rows:
              - parameter: PYTHON_CMD
                short:
                  de: "Python-Befehl des Runners"
                  en: "Python command used by the runner"
                usage:
                  de: "Python-Runner"
                  en: "Python runner"
                technical_sources:
                  - src/cli/php/PythonResolver.php
                formal_sources:
                  - src/resources/config/dev-python.yaml
                  - README.md
                  - docs/ENVIRONMENTS.md
                dependencies:
                  de: "Wirkt mit <code>PYTHON_PATHS</code>; nur in der Python-Phase relevant."
                  en: "Works with <code>PYTHON_PATHS</code>; relevant only in the Python phase."
                p0: true
              - parameter: PYTHON_PATHS
                short:
                  de: "Zusätzliche Python-Suchpfade"
                  en: "Additional Python search paths"
                usage:
                  de: "Python-Runner"
                  en: "Python runner"
                technical_sources:
                  - src/cli/php/util/PythonRunner.php
                formal_sources:
                  - src/resources/config/dev-python.yaml
                  - README.md
                  - docs/ENVIRONMENTS.md
                dependencies:
                  de: "Optionale Ergänzung zu <code>PYTHON_CMD</code>; bleibt an Runner-Aufruf gekoppelt."
                  en: "Optional addition to <code>PYTHON_CMD</code>; remains coupled to the runner call."
                p0: true
      - key: build
        summary:
          de: "Build-seitige Parameter für CV-Erzeugung, Upload und Render-Pfade."
          en: "Build-side parameters for CV generation, upload, and render paths."
        areas:
          - key: app
            rows:
              - parameter: APP_BASE_PATH
                short:
                  de: "URL-Basis-Pfad im Build"
                  en: "URL base path in the build path"
                usage:
                  de: "CV-Build und Render-Pfad"
                  en: "CV build and render path"
                technical_sources:
                  - src/cli/php/Cv/CvUploadService.php
                  - src/cli/php/ConfigValues.php
                formal_sources:
                  - src/resources/config/dev-build.yaml
                  - J01-105
                dependencies:
                  de: "Teilt den Schlüssel mit der Runtime, aber mit eigenem Build-Lesepfad."
                  en: "Shares the key with runtime, but with its own build-side read path."
                p0: true
          - key: lebenslauf
            rows:
              - parameter: LEBENSLAUF_DATEN_PFAD
                short:
                  de: "Pfad zum Lebenslauf-Datenverzeichnis"
                  en: "Path to the CV data directory"
                usage:
                  de: "Content-Quelle für CV-Build"
                  en: "Content source for CV build"
                technical_sources:
                  - src/cli/php/Cv/ContentSourceResolver.php
                formal_sources:
                  - README.md
                  - README.en.md
                dependencies:
                  de: "Trägt den Wurzelpfad für YAML- und JSON-Ableitungen."
                  en: "Provides the root path for YAML and JSON derivations."
                p0: true
              - parameter: LEBENSLAUF_YAML_PFAD
                short:
                  de: "Optionale YAML-Quelldatei"
                  en: "Optional YAML source file"
                usage:
                  de: "Content-Quelle und Dev-Watcher"
                  en: "Content source and dev watcher"
                technical_sources:
                  - src/cli/php/Cv/ContentSourceResolver.php
                  - src/cli/py/dev/dev.py
                formal_sources: []
                dependencies:
                  de: "Übersteuert den Standardpfad aus <code>LEBENSLAUF_DATEN_PFAD</code>."
                  en: "Overrides the default path derived from <code>LEBENSLAUF_DATEN_PFAD</code>."
                p0: true
              - parameter: LEBENSLAUF_PUBLIC_PROFILE
                short:
                  de: "Öffentliches Profil für den Build-Pfad"
                  en: "Public profile name on the build path"
                usage:
                  de: "CV-Build, Upload und Preview-Config-Check"
                  en: "CV build, upload, and preview config check"
                technical_sources:
                  - src/cli/php/Cv/CvBuildService.php
                  - src/cli/php/Cv/CvUploadService.php
                  - bin/ci
                formal_sources:
                  - README.md
                  - J01-105
                dependencies:
                  de: "Bleibt nur build-seitig belegt; frühere Setup-/Runtime-Kandidatur ist ausgeschlossen."
                  en: "Remains evidenced only on the build side; the earlier setup/runtime candidacy is excluded."
                p0: true
              - parameter: LEBENSLAUF_LANG_DEFAULT
                short:
                  de: "Standardsprache des Lebenslaufs"
                  en: "Default language of the CV"
                usage:
                  de: "Upload- und Render-Pfad"
                  en: "Upload and render path"
                technical_sources:
                  - src/cli/php/Cv/CvUploadService.php
                formal_sources:
                  - src/resources/config/dev-build.yaml
                  - J01-105
                dependencies:
                  de: "Gehört funktional zu <code>LEBENSLAUF_LANGS</code>; taucht auch im Runtime-Pfad auf."
                  en: "Functionally belongs with <code>LEBENSLAUF_LANGS</code>; also appears in the runtime path."
                p0: true
              - parameter: LEBENSLAUF_LANGS
                short:
                  de: "Unterstützte Sprachliste"
                  en: "Supported language list"
                usage:
                  de: "Upload- und Render-Pfad"
                  en: "Upload and render path"
                technical_sources:
                  - src/cli/php/Cv/CvUploadService.php
                formal_sources:
                  - src/resources/config/dev-build.yaml
                  - J01-105
                dependencies:
                  de: "Trägt die Mehrsprachigkeit gemeinsam mit <code>LEBENSLAUF_LANG_DEFAULT</code>."
                  en: "Carries multilingual behavior together with <code>LEBENSLAUF_LANG_DEFAULT</code>."
                p0: true
      - key: runtime
        summary:
          de: "HTTP-Runtime-Parameter für Routing, Formularpfad und Mail-Versand."
          en: "HTTP runtime parameters for routing, form handling, and mail delivery."
        areas:
          - key: app
            rows:
              - parameter: APP_BASE_PATH
                short:
                  de: "URL-Basis-Pfad der Runtime"
                  en: "Runtime URL base path"
                usage:
                  de: "HTTP-Runtime"
                  en: "HTTP runtime"
                technical_sources:
                  - src/Http/ConfigCompiled.php
                  - src/Http/AppBuilder.php
                formal_sources:
                  - src/resources/config/dev-runtime.yaml
                  - README.en.md
                dependencies:
                  de: "Teilt den Schlüssel mit dem Build, aber über separaten Runtime-Lesepfad."
                  en: "Shares the key with the build path, but through a separate runtime read path."
                p0: true
              - parameter: TRUST_PROXY
                short:
                  de: "Vertrauenswürdige Proxy-Ebenen"
                  en: "Trusted proxy depth"
                usage:
                  de: "HTTP-Runtime"
                  en: "HTTP runtime"
                technical_sources:
                  - src/Http/Actions/ContactFormAction.php
                  - src/Http/Actions/ContactSubmitAction.php
                formal_sources: []
                dependencies:
                  de: "Wirkt auf Request-Kontext für Formular- und Rate-Limit-Pfad."
                  en: "Affects request context for the form and rate-limit path."
                p0: true
          - key: lebenslauf
            rows:
              - parameter: LEBENSLAUF_LANG_DEFAULT
                short:
                  de: "Standardsprache in der CV-Ausgabe"
                  en: "Default language in CV output"
                usage:
                  de: "HTTP-Runtime"
                  en: "HTTP runtime"
                technical_sources:
                  - src/Http/Actions/CvAction.php
                formal_sources:
                  - README.md
                  - README.en.md
                dependencies:
                  de: "Läuft zusammen mit <code>LEBENSLAUF_LANGS</code> über denselben CV-Action-Pfad."
                  en: "Runs together with <code>LEBENSLAUF_LANGS</code> through the same CV action path."
                p0: true
              - parameter: LEBENSLAUF_LANGS
                short:
                  de: "Verfügbare Sprachen in der CV-Ausgabe"
                  en: "Available languages in CV output"
                usage:
                  de: "HTTP-Runtime"
                  en: "HTTP runtime"
                technical_sources:
                  - src/Http/Actions/CvAction.php
                formal_sources:
                  - README.md
                  - README.en.md
                dependencies:
                  de: "Kombiniert mit <code>LEBENSLAUF_LANG_DEFAULT</code> die Runtime-Sprachwahl."
                  en: "Combines with <code>LEBENSLAUF_LANG_DEFAULT</code> to drive runtime language selection."
                p0: true
          - key: captcha
            rows:
              - parameter: CAPTCHA_TTL_SECONDS
                short:
                  de: "Lebensdauer des Captcha-Tokens"
                  en: "Lifetime of the captcha token"
                usage:
                  de: "HTTP-Runtime und Captcha-CLI"
                  en: "HTTP runtime and captcha CLI"
                technical_sources:
                  - src/Http/AppContext.php
                  - src/cli/php/Command/CaptchaCommand.php
                formal_sources: []
                dependencies:
                  de: "Verbindet Runtime-Validierung und Captcha-Erzeugung."
                  en: "Connects runtime validation and captcha generation."
                p0: true
              - parameter: CAPTCHA_MAX_GET
                short:
                  de: "Maximale Captcha-Anfragen pro Fenster"
                  en: "Maximum captcha requests per window"
                usage:
                  de: "HTTP-Runtime"
                  en: "HTTP runtime"
                technical_sources:
                  - src/Http/Actions/ContactFormAction.php
                formal_sources: []
                dependencies:
                  de: "Greift mit dem Formularpfad auf dieselbe Captcha-Steuerung zu."
                  en: "Uses the same captcha control path as the contact form."
                p0: true
          - key: contact
            rows:
              - parameter: CONTACT_MAX_POST
                short:
                  de: "Maximale Formular-Absendungen"
                  en: "Maximum form submissions"
                usage:
                  de: "HTTP-Runtime"
                  en: "HTTP runtime"
                technical_sources:
                  - src/Http/Actions/ContactSubmitAction.php
                formal_sources: []
                dependencies:
                  de: "Hängt am Kontaktformular-Submit und am Rate-Limit-Fenster."
                  en: "Depends on contact-form submission and the rate-limit window."
                p0: true
              - parameter: CONTACT_TO_EMAIL
                short:
                  de: "Empfängeradresse des Kontaktformulars"
