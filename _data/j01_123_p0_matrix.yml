                  en: "HTTP runtime"
                technical_sources:
                  - src/Http/Actions/ContactFormAction.php
                  - src/Http/Actions/ContactSubmitAction.php
                formal_sources: []
                dependencies:
                  de: "Gilt gemeinsam für Kontakt- und Captcha-nahe Request-Pfade."
