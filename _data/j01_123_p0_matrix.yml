                  en: "Mail service"
                technical_sources:
                  - src/Http/Contact/MailService.php
                formal_sources: []
                dependencies:
                  de: "Teil des SMTP-Transportbündels."
                  en: "Part of the SMTP transport bundle."
                p0: true
              - parameter: SMTP_USER
                short:
